{% load i18n %}

<footer class="border-top border-opacity-50 mt-5 pt-3 pb-4 text-body-secondary small">

  <div class="d-flex flex-wrap justify-content-center align-items-center gap-3 mb-2">
    <a class="link-secondary link-underline-opacity-0 link-underline-opacity-100-hover" href="/docs/">
      <i class="bi bi-book"></i> {% translate "Documentation" %}
    </a>
    <a class="link-secondary link-underline-opacity-0 link-underline-opacity-100-hover" href="{% url 'admin:index' %}">
      <i class="bi bi-gear"></i> {% translate "Backend" %}
    </a>
  </div>

  <div class="d-flex flex-wrap justify-content-center align-items-center gap-2 text-center">
    {% if project_repository_url %}
      <a class="link-secondary link-underline-opacity-0 link-underline-opacity-100-hover" href="{{ project_repository_url }}" target="_blank" rel="noopener">
        <i class="bi bi-git"></i> {% translate "Repository" %}
      </a>
      <span class="text-body-tertiary">&middot;</span>
      {% endif %}
    {% if project_issues_url %}
      <a class="link-secondary link-underline-opacity-0 link-underline-opacity-100-hover" href="{{ project_issues_url }}" target="_blank" rel="noopener">
        <i class="bi bi-bug"></i> {% translate "Report an issue" %}
      </a>
      <span class="text-body-tertiary">&middot;</span>
    {% endif %}
    <span>
      DLCDB{% if project_version %} <span class="font-monospace">v{{ project_version }}</span>{% endif %}
    </span>
    <span class="text-body-tertiary">&middot;</span>
    <span>EUPL-1.2</span>
  </div>

</footer>
