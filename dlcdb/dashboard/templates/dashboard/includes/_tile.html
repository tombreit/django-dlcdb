{% load i18n %}

<div class="col">
  <a
    href="{% url tile.url %}{% if tile.query_params %}?{{ tile.query_params }}{% endif %}"
    class="card h-100 text-decoration-none text-reset text-center"
  >
    <div class="card-body d-flex flex-column align-items-center justify-content-center">
      <div class="display-6 fw-semibold lh-1">{{ tile.count }}</div>
      <div class="mt-2">
        <i class="{{ tile.icon }} me-1"></i>{{ tile.label }}
      </div>
      {% if tile.show_badge %}
        <span
          class="badge text-bg-warning mt-2"
          title="{% blocktranslate count counter=tile.note_count %}{{ counter }} with note{% plural %}{{ counter }} with notes{% endblocktranslate %}"
        >
          <i class="bi bi-chat"></i> {{ tile.note_count }}
        </span>
      {% endif %}
    </div>
  </a>
</div>
