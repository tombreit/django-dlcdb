{% load static %}

<a
    class="grid-tile"
    href="{{ url }}{% if query_params %}?{{ query_params }}{% endif %}"
>
    <div>
    {% if chart_html %}
        {{ chart_html|safe }}
    {% elif obj_count %}
        <div class="obj-count">
            {{ obj_count }}
        </div>
    {% endif %}

    <i class="{{ model_class_icon }}"></i> {{ text }}

    {% if badge %}
        <br>
        {{ badge }}
    {% endif %}

    </div>
</a>
