<span class="dropdown-item">
  {% csrf_token %}
  <div class="form-check form-switch">
    <input
      id="qr-toggle"
      class="form-check-input"
      type="checkbox"
      role="switch"
      {% if request.session.qrscanner_enabled == 1 %} checked {% endif %}
    >
    <label
      class="form-check-label"
      for="qr-toggle"
      title="QR scanner"
    >
      QR scanner
    </label>
  </div>
</span>
