{% extends 'admin/change_form.html' %}


{% block object-tools %}
    <style>
        .admin-btn-primary {
            color: white !important;
            background: var(--primary) !important;
        }
    </style>
    {{ block.super }}
{% endblock object-tools %}


{% block object-tools-items %}
    {% if original and original.is_report_subscription %}
    <li>
        <a
            class="admin-btn-primary"
            href="{% url 'admin:notifications_subscription_trigger' original.id %}"
        >
            &rarr; Trigger ad hoc report
        </a>
    </li>
    {% endif %}
    {{ block.super }}
{% endblock object-tools-items %}
