{% load i18n %}

{% if rooms %}
  <div class="bg-body border rounded shadow-sm overflow-auto p-1" style="max-height: 22rem;">
    {% for room in rooms %}
      {% include "assets/includes/_room_list_item.html" with room=room selectable=True %}
    {% endfor %}
  </div>
{% elif query %}
  <div class="bg-body border rounded shadow-sm p-3 text-muted small">
    <i>{% translate "No matching room found." %}</i>
  </div>
{% endif %}
